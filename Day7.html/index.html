<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <form action="">
      <label for="country">Select your country</label>
      <select name="country" id="country">
        <option value="India">India</option>
        <option value="Australia">Australia</option>
        <option value="America">America</option>
        <optgroup label="Africa">
          <option value="South Africa ">South Africa</option>
        </optgroup>
      </select>
      <br />
      <label for="message">Write Your Meassage</label><br />
      <textarea
        name="message"
        id="message"
        cols="30"
        rows="10"
        style="resize: none"
      >
      </textarea>
      <br />

      <label for="percentage">Select Percentage</label>
      <input
        type="range"
        name="percentage"
        id="percentage"
        min="35"
        max="100"
      />
      <span>50</span>
      <br />
      <label for="profile"> Upload profile Photo</label>
      <input type="file" name="profile" id="profile" /><br />

      <label for="state">Select State</label>
      <input id="state" list="states" />

      <datalist id="states">
        <option value="Maharashtra"></option>
        <option value="Tamil nadu"></option>
        <option value="Kerala"></option>
        <option value="karnataka"></option>
        <option value="Goa"></option>
        <option value="Ladakh"></option>
      </datalist>

      <button type="submit">Sign up</button><br />
      <button type="button">Create new account</button><br />
      <button type="reset">reset</button>
    </form>
  </body>
</html>
