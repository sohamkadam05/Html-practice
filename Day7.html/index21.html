<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h1>Application Form</h1>
    <form action="">
      <label for="name">First Name:</label>
      <input type="text" name="name" id="name" />
      <label for="name">Last Name:</label>
      <input type="text" name="name" id="name" />
      <br />
      <label for="DOB">Date of birth: </label>
      <input type="date" name="DOB" id="Dob" />
      <label for="age">Age:</label>
      <select name="Age" id="age">
        <option value="18">18</option>
        <option value="19">19</option>
        <option value="20">20</option>
        <option value="21">21</option>
        <option value="22">22</option>
        <option value="23">23</option>
        <option value="24">24</option>
      </select>
      <br />

      <label for="gender">Gender:</label>
      <select name="gender" id="gender">
        <option value="Male">Male</option>
        <option value="Female">Female</option>
        <option value="Others">Others</option>
      </select>
      <label for="email">Email Address:</label>
      <input type="email" name="email" id="email" />
      <br />

      <span>Positions Availabe:</span>
      <input
        type="radio"
        name="developer"
        id="Junior Developer"
        value="Junior Developer"
      />Junior Developer
      <input
        type="radio"
        name="developer"
        id="Mid Developer"
        value="Mid Developer"
      />Mid Developer
      <input
        type="radio"
        name="developer"
        id="Senior Developer"
        value="Senior Developer"
      />Senior Developer
      <br />

      <span>Programming Languages: </span>
      <input type="checkbox" name="Language" id="Java" value="Java" />Java
      <input
        type="checkbox"
        name="Language"
        id="JavaScript"
        value="JavaScript"
      />JavaScript
      <input type="checkbox" name="Language" id="Python" value="Python" />Python
      <br />
      <label for="password">Password:</label>
      <input type="password" name="password" id="password" />
      <label for="password">Confirm Password:</label>
      <input type="password" name="password" id="Confirm password" />
      <br />
      <button type="submit">Submit</button>
      <button type="reset">Reset</button>
    </form>
  </body>
</html>
