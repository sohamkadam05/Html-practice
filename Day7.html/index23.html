<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h2>User personal information</h2>
    <form action="">
      <label for="Name">Enter your full name</label><br />
      <input type="text" name="Name" id="Name" /> <br />

      <label for="email">Enter your email</label><br />
      <input type="email" name="email" id="email" /><br />

      <label for="password">Enter your password</label><br />
      <input type="password" name="password" id="password" />
      <br />
      <label for="Confirm password">Confirm your password</label><br />
      <input type="password" name="password" id="Confirm password" />
      <br />

      <span>Enter your gender</span><br />
      <input type="radio" name="gender" id="Male" value="Male" />Male
      <input type="radio" name="gender" id="Female" value="Female" />Female

      <input type="radio" name="gender" id="Others" value="Others" />Others
      <br />
      <label for="DOB">Enter your Date of Birth</label><br />
      <input type="date" name="DOB" id="DOB" />
      <br />
      <label for="Address">Enter your Address:</label><br />
      <input type="text" name="Address" id="Address" />
      <br />
      <br />
      <button type="submit">Submit</button>
    </form>
  </body>
</html>
