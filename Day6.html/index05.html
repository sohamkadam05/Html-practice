<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h1>Sign up</h1>
    <form action="./index1.html" target="_blank">
      <label for="Username">Enter Username :</label>
      <input type="text" id="user name" name="user name" required />
      <br />
      <label for="password">Enter password :</label>
      <input type="password" id="password" name="password" required />
      <br />
      <label for="email">Enter Email :</label>
      <input type="email" id="email" name="email" required />
      <br />
      <label for="DoB">Enter DOB :</label>
      <input type="date" name="DoB" id="DoB" />
      <br />
      <span>Select Gender :</span>
      <input type="radio" name="gender" id="male" value="male" />Male
      <input type="radio" name="gender" id="female" value="female" />Female
      <input type="radio" name="gender" id="other" value="other" />Other
      <br />
      <span>Select courses</span>
      <input type="checkbox" name="course" id="Java" value="Java" />Java
      <input
        type="checkbox"
        name="course"
        id="JavaScript"
        value="JavaScript"
      />JavaScript
      <input type="checkbox" name="course" id="PHP" value="PHP" />PHP
      <input type="checkbox" name="course" id="React" value="React" />React
      <input type="checkbox" name="course" id="Node" value="Node" />Node

      <br />
      <label for="country">Select your country</label>
      <select name="country" id="country">
        <option value="India">India</option>
        <option value="Australia">Australia</option>
        <option value="America">America</option>
        <optgroup label="Africa">
          <option value="South Africa ">South Africa</option>
        </optgroup>
      </select>
      <br />
      <label for="message">Write Your Meassage</label><br />
      <textarea
        name="message"
        id="message"
        cols="30"
        rows="10"
        style="resize: none"
      >
      </textarea>
      <br />

      <label for="percentage">Select Percentage</label>
      <input
        type="range"
        name="percentage"
        id="percentage"
        min="35"
        max="100"
      />
      <span>50</span>
      <br />
      <label for="profile"> Upload profile Photo</label>
      <input type="file" name="profile" id="profile" /><br />
      <label for="state">Select State</label>
      <input id="state" list="states" />

      <datalist id="states">
        <option value="Maharashtra"></option>
        <option value="Tamil nadu"></option>
        <option value="Kerala"></option>
        <option value="karnataka"></option>
        <option value="Goa"></option>
        <option value="Ladakh"></option></datalist
      ><br />

      <button type="submit">Sign up</button>
      <button type="button">Create new account</button>
      <button type="reset">reset</button>
    </form>
  </body>
</html>
